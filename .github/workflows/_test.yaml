name: Test & Build Package

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      build-runners: ${{ steps.resolve.outputs.build-runners }}
      import-name: ${{ steps.resolve.outputs.import-name }}
      is-rusty: ${{ steps.resolve.outputs.is-rusty }}
      python-versions: ${{ steps.resolve.outputs.python-versions }}
      primary-python-version: ${{ steps.resolve.outputs.primary-python-version }}
      rust-toolchain: ${{ steps.resolve.outputs.rust-toolchain }}
    env:
      PACKAGE: ${{ inputs.package }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v8.1.0

      - id: resolve
        shell: bash
        run: |
          set -euo pipefail

          metadata="$(python3 .github/scripts/package_version.py info "$PACKAGE")"
          echo "$metadata" >> "$GITHUB_OUTPUT"
          is_rusty="$(sed -n 's/^is-rusty=//p' <<< "$metadata")"
          requires_python="$(sed -n 's/^requires-python=//p' <<< "$metadata")"

          versions_file="$PACKAGE/.python-versions"
          if [ ! -f "$versions_file" ]; then
            versions_file=".python-versions"
          fi

          versions="$(awk '$0 && $0 !~ /^#/ { print }' "$versions_file")"
          if [ -n "$requires_python" ]; then
            supported="$(
              uv python list "$requires_python" \
                --only-downloads \
                --output-format json \
                | jq -r '.[].version_parts | "\(.major).\(.minor)"' \
                | sort -u
            )"
            versions="$(grep -Fx -f <(printf '%s\n' "$supported") <<< "$versions")"
          fi

          # Non-Linux runners test only the newest supported version to keep the
          # matrix small; Linux still spans the full version list.
          primary="$(sort -V <<< "$versions" | tail -1)"
          echo "primary-python-version=$primary" >> "$GITHUB_OUTPUT"

          versions="$(jq -R -s -c 'split("\n") | map(select(length > 0))' <<< "$versions")"
          echo "python-versions=$versions" >> "$GITHUB_OUTPUT"

          if [ "$is_rusty" = "true" ]; then
            build_runners='["ubuntu-latest","ubuntu-24.04-arm","windows-latest","macos-15-intel","macos-15"]'
          else
            build_runners='["ubuntu-latest"]'
          fi
          echo "build-runners=$build_runners" >> "$GITHUB_OUTPUT"

          rust_toolchain="$(
            python3 - <<'PY'
          import tomllib

          with open("rust-toolchain.toml", "rb") as file:
              print(tomllib.load(file)["toolchain"]["channel"])
          PY
          )"
          echo "rust-toolchain=$rust_toolchain" >> "$GITHUB_OUTPUT"

  test-rust:
    needs: resolve
    if: needs.resolve.outputs.is-rusty == 'true'
    runs-on: ubuntu-latest
    env:
      PACKAGE: ${{ inputs.package }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          cache-workspaces: . -> target
          # An exported RUSTFLAGS would override the v2 target-cpu flags in
          # .cargo/config.toml (env beats target config) — never set it.
          rustflags: ""

      - name: Test Rust debug
        shell: bash
        run: |
          set -euo pipefail
          cd "$PACKAGE"
          cargo test

      - name: Test Rust release
        shell: bash
        run: |
          set -euo pipefail
          cd "$PACKAGE"
          cargo test --release

  test:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ${{ fromJson(needs.resolve.outputs.python-versions) }}
        include:
          - os: macos-15
            python-version: ${{ needs.resolve.outputs.primary-python-version }}
          - os: windows-latest
            python-version: ${{ needs.resolve.outputs.primary-python-version }}
    runs-on: ${{ matrix.os }}
    env:
      PACKAGE: ${{ inputs.package }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          cache-suffix: ${{ env.PACKAGE }}-${{ matrix.os }}-py${{ matrix.python-version }}
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          working-directory: ${{ env.PACKAGE }}

      - name: Install Rust toolchain
        if: needs.resolve.outputs.is-rusty == 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          cache-workspaces: . -> target
          rustflags: ""

      - name: Install h2spec
        if: env.PACKAGE == 'h2corn' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL \
            https://github.com/summerwind/h2spec/releases/download/v2.6.0/h2spec_linux_amd64.tar.gz \
            | tar -xzf - h2spec
          sudo mv h2spec /usr/local/bin/

      - name: Test Python
        shell: bash
        run: |
          set -euo pipefail
          cd "$PACKAGE"
          uv sync
          uv run pytest

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJson(needs.resolve.outputs.build-runners) }}
    runs-on: ${{ matrix.runner }}
    env:
      PACKAGE: ${{ inputs.package }}
      CIBW_ARCHS_WINDOWS: "AMD64"
      CIBW_BUILD_VERBOSITY: "1"
      CIBW_ENABLE: "cpython-freethreading pypy"
      CIBW_ENVIRONMENT_LINUX: PATH="$HOME/.cargo/bin:$PATH"
      CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET="11.0"
      CIBW_ENVIRONMENT_PASS_LINUX: RUSTUP_TOOLCHAIN
      CIBW_SKIP: "pp39-* pp310-*"
      CIBW_TEST_COMMAND: python -c "import ${{ needs.resolve.outputs.import-name }}"
      RUSTUP_TOOLCHAIN: ${{ needs.resolve.outputs.rust-toolchain }}
      CIBW_BEFORE_ALL_LINUX:
        'curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
        --default-toolchain none && rustup toolchain install --profile minimal
        "$RUSTUP_TOOLCHAIN"'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          enable-cache: true
          working-directory: ${{ env.PACKAGE }}

      - name: Rewrite README for PyPI
        shell: bash
        run: python3 .github/scripts/render_pypi_readme.py "$PACKAGE" "${{ github.ref_name }}"

      - name: Install Rust toolchain
        if: needs.resolve.outputs.is-rusty == 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          cache-workspaces: . -> target
          rustflags: ""

      # Generate LICENSE-THIRD-PARTY.md into the package tree BEFORE building, so
      # maturin bundles it via the default license-files glob (cibuildwheel copies
      # the generated file into its build container; the sdist picks it up too).
      - name: Install cargo-about
        if: needs.resolve.outputs.is-rusty == 'true'
        uses: taiki-e/install-action@v2.82.2
        with:
          tool: cargo-about@0.8.4

      - name: Generate third-party licenses
        if: needs.resolve.outputs.is-rusty == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/gen_third_party_licenses.py "$PACKAGE"

      - name: Build wheels
        if: needs.resolve.outputs.is-rusty == 'true'
        shell: bash
        run: |
          uv tool run \
            --from "cibuildwheel==3.4.1" cibuildwheel \
            --output-dir dist \
            "$PACKAGE"

      - name: Build package
        if: needs.resolve.outputs.is-rusty == 'false'
        shell: bash
        run: uv build -o dist "$PACKAGE"

      - name: Build sdist
        if: needs.resolve.outputs.is-rusty == 'true' && matrix.runner == 'ubuntu-latest'
        shell: bash
        run: uv build --sdist -o dist "$PACKAGE"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: dist-${{ env.PACKAGE }}-${{ matrix.runner }}
          path: dist
