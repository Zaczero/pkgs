name: Test & Build Package

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      build-runners: ${{ steps.resolve.outputs.build-runners }}
      import-name: ${{ steps.resolve.outputs.import-name }}
      is-rusty: ${{ steps.resolve.outputs.is-rusty }}
      pypy: ${{ steps.resolve.outputs.pypy }}
      primary-python-version: ${{ steps.resolve.outputs.primary-python-version }}
      rust-toolchain: ${{ steps.resolve.outputs.rust-toolchain }}
      test-matrix: ${{ steps.resolve.outputs.test-matrix }}
    env:
      PACKAGE: ${{ inputs.package }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v8.3.2

      - id: resolve
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/matrix.py "$PACKAGE"

  test-rust:
    needs: resolve
    if: needs.resolve.outputs.is-rusty == 'true'
    runs-on: ubuntu-latest
    env:
      PACKAGE: ${{ inputs.package }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          toolchain: ${{ needs.resolve.outputs.rust-toolchain }}
          cache-workspaces: . -> target
          # Empty: avoid RUSTFLAGS env overriding .cargo/config.toml target-cpu.
          rustflags: ""

      # Practical behavior only — no clippy/fmt/lint gates in CI.
      - name: Test Rust debug
        shell: bash
        run: |
          set -euo pipefail
          cd "$PACKAGE"
          cargo test

      - name: Test Rust release
        shell: bash
        run: |
          set -euo pipefail
          cd "$PACKAGE"
          cargo test --release

  test:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve.outputs.test-matrix) }}
    runs-on: ${{ matrix.os }}
    env:
      PACKAGE: ${{ inputs.package }}
      FREETHREADED: ${{ matrix.freethreaded }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          cache-suffix: ${{ env.PACKAGE }}-${{ matrix.os }}-py${{ matrix.python-version }}
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          working-directory: ${{ env.PACKAGE }}

      # uv Linux free-threaded standalone builds may publish sysconfig under a
      # t-suffixed name. Only Linux freethreaded needs this; drop when uv fixes.
      - name: Configure free-threaded Linux sysconfig
        if: matrix.freethreaded == 'true' && runner.os == 'Linux'
        shell: bash
        run: echo "_PYTHON_SYSCONFIGDATA_NAME=_sysconfigdata_t_linux_x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        if: needs.resolve.outputs.is-rusty == 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          toolchain: ${{ needs.resolve.outputs.rust-toolchain }}
          cache-workspaces: . -> target
          rustflags: ""

      - name: Package before-test hook
        if: hashFiles(format('{0}/tools/ci_before_test.sh', inputs.package)) != ''
        shell: bash
        run: |
          set -euo pipefail
          bash "$PACKAGE/tools/ci_before_test.sh"

      - name: Test Python
        shell: bash
        run: |
          set -euo pipefail
          cd "$PACKAGE"
          uv sync --python "${{ matrix.python-version }}"
          if [ "$FREETHREADED" = "true" ]; then
            uv run --python "${{ matrix.python-version }}" python -c \
              'import importlib, sys; importlib.import_module("${{ needs.resolve.outputs.import-name }}"); assert not sys._is_gil_enabled()'
          fi
          uv run --python "${{ matrix.python-version }}" pytest

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJson(needs.resolve.outputs.build-runners) }}
    runs-on: ${{ matrix.runner }}
    env:
      PACKAGE: ${{ inputs.package }}
      CIBUILDWHEEL_VERSION: "4.1.0"
      # Native arch only — avoids win32 from auto on windows-latest; pairs with
      # windows-11-arm for ARM64 wheels.
      CIBW_ARCHS: native
      CIBW_BUILD_FRONTEND: build[uv]
      CIBW_ENVIRONMENT_LINUX: PATH="$HOME/.cargo/bin:$PATH"
      CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET="11.0"
      CIBW_ENVIRONMENT_PASS_LINUX: RUSTUP_TOOLCHAIN
      CIBW_TEST_COMMAND: python -c "import ${{ needs.resolve.outputs.import-name }}"
      RUSTUP_TOOLCHAIN: ${{ needs.resolve.outputs.rust-toolchain }}
      CIBW_BEFORE_ALL_LINUX:
        'curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
        --default-toolchain none && rustup toolchain install --profile minimal
        "$RUSTUP_TOOLCHAIN"'
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          enable-cache: true
          working-directory: ${{ env.PACKAGE }}

      - name: Rewrite README for PyPI
        shell: bash
        run: python3 .github/scripts/render_pypi_readme.py "$PACKAGE" "${{ github.ref_name }}"

      - name: Install Rust toolchain
        if: needs.resolve.outputs.is-rusty == 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          toolchain: ${{ needs.resolve.outputs.rust-toolchain }}
          cache-workspaces: . -> target
          rustflags: ""

      - name: Install cargo-about
        if: needs.resolve.outputs.is-rusty == 'true'
        uses: taiki-e/install-action@v2.83.1
        with:
          tool: cargo-about@0.8.4

      - name: Generate license files
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/gen_licenses.py "$PACKAGE"

      - name: Build wheels
        if: needs.resolve.outputs.is-rusty == 'true'
        env:
          # PyPy opt-in only (cibuildwheel 4 default is no pp*). Free-threaded
          # 3.14t wheels need no enable (cpython-freethreading removed in 4.x).
          CIBW_ENABLE: ${{ needs.resolve.outputs.pypy == 'true' && 'pypy' || '' }}
        shell: bash
        run: |
          # Unset empty enable so we do not override tool defaults with "".
          if [ -z "${CIBW_ENABLE}" ]; then
            unset CIBW_ENABLE
          fi
          uv tool run \
            --from "cibuildwheel==$CIBUILDWHEEL_VERSION" cibuildwheel \
            --output-dir dist \
            "$PACKAGE"

      - name: Build package
        if: needs.resolve.outputs.is-rusty == 'false'
        shell: bash
        run: uv build -o dist "$PACKAGE"

      - name: Build sdist
        if: needs.resolve.outputs.is-rusty == 'true' && matrix.runner == 'ubuntu-latest'
        shell: bash
        run: uv build --sdist -o dist "$PACKAGE"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: dist-${{ env.PACKAGE }}-${{ matrix.runner }}
          path: dist
