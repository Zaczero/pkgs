name: CI

on:
  push:
    branches: [main]
    tags: ["*/*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      release-package: ${{ steps.release.outputs.package }}
      release-version: ${{ steps.release.outputs.version }}
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      BEFORE_SHA: ${{ github.event.before }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            changed="${tag%/*}"
          else
            if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
              test_all=true
              changed=""
            elif [ "$EVENT_NAME" = "pull_request" ]; then
              base="$BASE_SHA"
              test_all=false
            else
              base="$BEFORE_SHA"
              test_all=false
            fi

            # Single source of truth for the release-package set (excludes dev-only
            # tooling like pyo3stubs that pins a static version).
            all_packages="$(python3 .github/scripts/package_version.py list)"

            if ! $test_all && [[ "$base" =~ ^0+$ ]]; then
              test_all=true
              changed=""
            elif ! $test_all; then
              relevant="$(git diff --name-only "$base" HEAD | python3 .github/scripts/path_filter.py)"

              if [ -z "$relevant" ]; then
                changed=""
              else
                changed="$(echo "$relevant" | cut -d/ -f1 | sort -u)"
                # Any changed top-level dir that is not a release package (shared
                # infra, or dev tooling like pyo3stubs) means "test everything".
                for package in $changed; do
                  grep -qxF "$package" <<< "$all_packages" || test_all=true
                done
              fi
            fi

            if $test_all; then
              changed="$all_packages"
            fi
          fi

          packages="$(
            jq -R -s -c '
              split("\n")
              | map(select(length > 0))
            ' <<< "$changed"
          )"
          echo "packages=$packages" >> "$GITHUB_OUTPUT"

      - id: release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF#refs/tags/}"
          package="${tag%/*}"
          version="${tag#*/}"
          python3 .github/scripts/package_version.py check "$package" "$version"

  test:
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
    uses: ./.github/workflows/_test.yaml
    with:
      package: ${{ matrix.package }}

  release:
    needs: [detect, test]
    if: >-
      startsWith(github.ref, 'refs/tags/')
      && needs.test.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ needs.detect.outputs.release-package }}
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: dist-${{ needs.detect.outputs.release-package }}-*
          path: dist
          merge-multiple: true

      - name: Require non-empty dist
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no artifacts under dist/ for ${{ needs.detect.outputs.release-package }}" >&2
            exit 1
          fi
          ls -la dist/

      - uses: actions/attest@v4.1.1
        with:
          subject-path: dist/*

      - uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          skip-existing: true
