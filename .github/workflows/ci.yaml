name: CI

on:
  push:
    branches: [main]
    tags: ["*/*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      release-package: ${{ steps.release.outputs.package }}
      release-type: ${{ steps.release.outputs.type }}
      release-version: ${{ steps.release.outputs.version }}
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      BEFORE_SHA: ${{ github.event.before }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            changed="${tag%/*}"
          else
            if [ "$EVENT_NAME" = "pull_request" ]; then
              base="$BASE_SHA"
            else
              base="$BEFORE_SHA"
            fi

            if [[ "$base" =~ ^0+$ ]]; then
              test_all=true
              changed=""
            else
              changed="$(git diff --name-only "$base" HEAD | cut -d/ -f1 | sort -u)"
              test_all=false

              for package in $changed; do
                [ -f "$package/pyproject.toml" ] || test_all=true
              done
            fi

            if $test_all; then
              changed="$(for file in */pyproject.toml; do echo "${file%%/*}"; done | sort)"
            fi
          fi

          packages="$(
            jq -R -s -c '
              split("\n")
              | map(select(length > 0))
            ' <<< "$changed"
          )"
          echo "packages=$packages" >> "$GITHUB_OUTPUT"

      - id: release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF#refs/tags/}"
          package="${tag%/*}"
          version="${tag#*/}"

          if [ -f "$package/Cargo.toml" ]; then
            type="python-rust"
          else
            type="python"
          fi

          {
            echo "package=$package"
            echo "version=$version"
            echo "type=$type"
          } >> "$GITHUB_OUTPUT"

  test:
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
    uses: ./.github/workflows/_test.yaml
    with:
      package: ${{ matrix.package }}

  release-validate:
    needs: detect
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      PACKAGE: ${{ needs.detect.outputs.release-package }}
      RELEASE_TYPE: ${{ needs.detect.outputs.release-type }}
      VERSION: ${{ needs.detect.outputs.release-version }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - id: check
        shell: bash
        run: |
          set -euo pipefail

          if [ "$RELEASE_TYPE" = "python-rust" ]; then
            package_version="$(grep '^version' "$PACKAGE/Cargo.toml" | head -1 | cut -d'"' -f2)"
          else
            package_name="${PACKAGE//-/_}"
            package_version="$(
              grep -oP \
                "__version__\s*=\s*['\"]?\K[^'\"]*" \
                "$PACKAGE/$package_name/__init__.py"
            )"
          fi

          if [ "$package_version" != "$VERSION" ]; then
            echo "Tag version ($VERSION) != package version ($package_version)"
            exit 1
          fi

  release:
    needs: [detect, release-validate, test]
    if: >-
      always()
      && startsWith(github.ref, 'refs/tags/')
      && needs.test.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ needs.detect.outputs.release-package }}
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: dist-${{ needs.detect.outputs.release-package }}-*
          path: dist
          merge-multiple: true

      - uses: actions/attest@v4.1.0
        with:
          subject-path: dist/*

      - uses: pypa/gh-action-pypi-publish@v1.14.0
